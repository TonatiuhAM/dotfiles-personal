# Kitty configuration based on Ghostty settings

# Font configuration
font_family      JetBrainsMono Nerd Font Mono
font_size        15.0

# Theme and colors
include          themes/tokyonight.conf

# Window appearance
window_padding_width    5
window_padding_height   5
hide_window_decorations titlebar-only
macos_titlebar_color    dark

# Background opacity and blur
background_opacity      0.86
background_blur         10

# Clipboard settings
copy_on_select          yes
strip_trailing_spaces   smart

# Shell integration
shell_integration       enabled

# Terminal settings
term                    xterm-256color

# Key bindings - equivalent to your Ghostty keybinds
map cmd+f               send_text all spf\n
map cmd+comma           send_text all tmux attach -t configs\n
map cmd+t               send_text all ta\n
map cmd+y               send_text all yabai --restart-service\n

# macOS specific settings
macos_option_as_alt     yes
macos_hide_from_tasks   no

# Performance optimizations
repaint_delay           10
input_delay             3
sync_to_monitor         yes

# Scrollback
scrollback_lines        2000

# Tab configuration
tab_bar_style           powerline
tab_powerline_style     slanted